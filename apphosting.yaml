# Firebase App Hosting configuration
# Docs: https://firebase.google.com/docs/app-hosting/configure

runConfig:
  cpu: 1
  memoryMiB: 512
  maxInstances: 10
  minInstances: 0
  concurrency: 80

# TODO: Add your environment variables here (non-secret values only)
# For secrets (API keys), use: firebase apphosting:secrets:set MY_SECRET
env:
  - variable: NODE_ENV
    value: production
