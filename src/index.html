  <!-- ── Performance: Preconnect ───────────────────────────────────────────── -->
  <!-- fonts.gstatic.com: woff2 files are fetched from here even when CSS is inlined.
       crossorigin is required because font files use CORS. -->
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
  <!-- TODO: Add preconnect for any CDNs or image hosts you use -->

  <!-- ── Critical inline CSS: Inter Fallback with size-adjusted metrics ────── -->
  <!-- Eliminates CLS during font swap by calibrating Arial to match Inter's
       exact ascent/descent/size so text never reflows when Inter loads.
       These values were calculated using: https://screenspan.net/fallback -->
  <style>
    @font-face {
      font-family: 'Inter Fallback';
      src: local('Arial'), local('Helvetica Neue');
      ascent-override: 90.20%;
      descent-override: 22.48%;
      line-gap-override: 0.00%;
      size-adjust: 107.40%;
    }
  </style>

  <!-- ── Google Fonts: Inter ──────────────────────────────────────────────── -->
  <!-- Angular inlines this at build time (fonts.inline:true in angular.json).
       No runtime request to fonts.googleapis.com is made in production.
       Woff2 files are still fetched from fonts.gstatic.com (preconnect above). -->
  <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap">

  <!-- ── Google Tag Manager — deferred until first user interaction ────────── -->
  <!--
    WHY DEFERRED: GTM's script evaluation costs ~314ms CPU during page load,
    all of which falls inside the TBT window and tanks your Lighthouse score.
    Events pushed to dataLayer before GTM loads are queued automatically
    and replayed once GTM initialises — no events are lost.

    TODO: Replace GTM-XXXXXXX with your real GTM container ID, then uncomment.
  -->
  <!--
  <script>
    window.dataLayer = window.dataLayer || [];
    (function(){
      var _gtmLoaded = false;
      function loadGTM(){
        if(_gtmLoaded) return; _gtmLoaded = true;
        (function(w,d,s,l,i){
          w[l]=w[l]||[];w[l].push({'gtm.start':new Date().getTime(),event:'gtm.js'});
          var f=d.getElementsByTagName(s)[0],j=d.createElement(s),
            dl=l!='dataLayer'?'&l='+l:'';
          j.async=true;j.src='https://www.googletagmanager.com/gtm.js?id='+i+dl;
          f.parentNode.insertBefore(j,f);
        })(window,document,'script','dataLayer','GTM-XXXXXXX');
      }
      // Trigger on first interaction — maximises TBT savings on mobile
      ['scroll','click','keydown','touchstart','mousemove'].forEach(function(e){
        window.addEventListener(e, loadGTM, {once:true, passive:true});
      });
      // 10-second fallback — ensures GTM loads even for users who don't interact.
      // 10s is chosen because on slow 4G, page TTI is ~5-6s. Firing at 5s puts
      // GTM's CPU work inside the TBT window. 10s guarantees it loads after TTI.
      setTimeout(loadGTM, 10000);
    })();
  </script>
  -->
