@if (visible && !dismissed) {
  <div class="sticky-cta" role="complementary" aria-label="Shop promotion banner">
    <div class="sticky-cta__inner container">
      <!-- TODO: Update promotional message -->
      <p class="sticky-cta__message">
        ✨ <strong>Free shipping</strong> on orders over $50 — curated K-beauty delivered to your door
      </p>
      <div class="sticky-cta__actions">
        <a routerLink="/shop"
           class="btn btn--primary btn--sm sticky-cta__btn"
           (click)="onCtaClick()">
          Shop Now
        </a>
        <button class="sticky-cta__dismiss"
                (click)="dismiss()"
                aria-label="Dismiss banner">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>
    </div>
  </div>
}
