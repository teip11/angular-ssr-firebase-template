@if (visible && !dismissed) {
  <div class="sticky-cta" role="complementary" aria-label="Promo-Banner">
    <div class="sticky-cta__inner container">
      <p class="sticky-cta__message">
        🚀 <strong>Kostenlose Demo</strong> — Ihre individuelle Website in 72h
      </p>
      <div class="sticky-cta__actions">
        <a routerLink="/demo"
           class="btn btn--primary btn--sm sticky-cta__btn"
           (click)="onCtaClick()">
          Demo anfordern
        </a>
        <button class="sticky-cta__dismiss"
                (click)="dismiss()"
                aria-label="Banner schließen">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>
    </div>
  </div>
}
