<!-- Outer wrapper: fixed, full-width, transparent, handles sticky positioning -->
<header
  class="navbar-header"
  [class.navbar-scrolled]="scrolled()"
  aria-label="Hauptnavigation">

  <!-- Inner nav: transitions from full-width to pill container -->
  <nav
    class="navbar-inner"
    [class.navbar-inner-scrolled]="scrolled()">

    <!-- Logo -->
    <a routerLink="/" class="navbar-logo">
      Gehrke Studio
    </a>

    <!-- Desktop Links -->
    <div class="navbar-links">
      <a class="navbar-link" routerLink="/projekte"   routerLinkActive="navbar-link-active">Projekte</a>
      <a class="navbar-link" routerLink="/leistungen" routerLinkActive="navbar-link-active">Leistungen</a>
      <a class="navbar-link" routerLink="/ueber-uns"  routerLinkActive="navbar-link-active">Über uns</a>
      <a class="navbar-link" routerLink="/blog"       routerLinkActive="navbar-link-active">Blog</a>
      <a class="navbar-link" routerLink="/kontakt"    routerLinkActive="navbar-link-active">Kontakt</a>
    </div>

    <!-- CTA -->
    <a routerLink="/demo" class="navbar-cta" id="navbar-cta-btn">
      Vorlage anfordern
    </a>

  </nav>
</header>
