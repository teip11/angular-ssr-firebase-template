<nav class="navbar">
  <div class="navbar__inner container">

    <!-- Logo — TODO: replace text with your SVG or image logo -->
    <a class="navbar__logo" routerLink="/" aria-label="Glow Seoul — Home">
      <span class="navbar__logo-text">Glow Seoul</span>
    </a>

    <!-- Desktop nav links -->
    <ul class="navbar__links" role="list">
      <!-- Spring-physics active indicator pill (GSAP-controlled) -->
      <li class="nav-indicator" aria-hidden="true"></li>

      @for (link of navLinks; track link.path) {
        <li>
          <a class="navbar__link"
             [class.navbar__link--active]="link.exact
               ? router.url === link.path
               : router.url.startsWith(link.path)"
             [routerLink]="link.path">
            <span class="navbar__link-inner">{{ link.label }}</span>
          </a>
        </li>
      }
    </ul>

    <!-- Desktop CTA — TODO: update link/text to match your primary action -->
    <a class="navbar__cta btn btn--primary" routerLink="/shop">
      <span class="navbar__cta-text">Shop Now</span>
      <span class="navbar__cta-shimmer" aria-hidden="true"></span>
    </a>

    <!-- Mobile hamburger -->
    <button class="navbar__hamburger"
            [attr.aria-expanded]="isMenuOpen"
            aria-label="Toggle menu"
            (click)="toggleMenu()">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <rect class="ham-top" x="3" y="7"  width="18" height="2" rx="1" fill="currentColor"/>
        <rect class="ham-mid" x="3" y="11" width="18" height="2" rx="1" fill="currentColor"/>
        <rect class="ham-bot" x="3" y="15" width="18" height="2" rx="1" fill="currentColor"/>
      </svg>
    </button>

  </div>
</nav>

<!-- Mobile scrim overlay -->
<div class="navbar__scrim"
     [class.navbar__scrim--active]="isMenuOpen"
     (click)="closeMenu()"
     aria-hidden="true">
</div>

<!-- Mobile bottom sheet -->
<div class="navbar__sheet"
     role="dialog"
     aria-modal="true"
     aria-label="Navigation menu"
     [attr.aria-hidden]="!isMenuOpen">

  <div class="navbar__sheet-handle" aria-hidden="true"></div>

  <ul class="navbar__sheet-links" role="list">
    @for (link of navLinks; track link.path) {
      <li class="navbar__sheet-item">
        <a [routerLink]="link.path"
           (click)="handleSheetLinkTap($event)"
           class="navbar__sheet-link"
           [class.navbar__sheet-link--active]="link.exact
             ? router.url === link.path
             : router.url.startsWith(link.path)">
          {{ link.label }}
        </a>
      </li>
    }
  </ul>

  <div class="navbar__sheet-footer">
    <!-- TODO: update CTA link/text -->
    <a routerLink="/shop" class="btn btn--primary btn--lg" style="width:100%;justify-content:center"
       (click)="closeMenu()">
      Shop Now
    </a>
  </div>

</div>
